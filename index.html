<!DOCTYPE html>
<html>
<head>
  <title>Gio's Game Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(#050b1a, #000814);
      color: white;
      text-align: center;
    }

    /* LOGIN */
    #login {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #1f6fff;
      color: white;
      cursor: pointer;
    }

    /* HEADER */
    #header {
      display: none;
      padding: 15px;
      background: linear-gradient(90deg, #001133, #0033aa);
      box-shadow: 0 0 20px #1f6fff;
    }

    /* MENU */
    #menu {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .game {
      background: #0b1b3a;
      border: 1px solid #1f6fff;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #1f6fff;
    }

    /* GAME SCREEN */
    #play {
      display: none;
      padding: 20px;
    }

    canvas {
      background: black;
      border: 1px solid #1f6fff;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>🔐 Enter Access Code</h1>
  <input id="code" placeholder="Enter code">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- HEADER -->
<div id="header">
  <h1>⚡ Welcome to Gio’s Game Site</h1>
</div>

<!-- MENU -->
<div id="menu"></div>

<!-- GAME -->
<div id="play">
  <button onclick="back()">⬅ Back</button>
  <h2 id="title"></h2>
  <div id="ui"></div>
  <canvas id="canvas" width="400" height="400"></canvas>
</div>

<script>

let games = ["Snake", "BitLife"];
let current = "";

let ctx = document.getElementById("canvas").getContext("2d");

/* ---------------- LOGIN ---------------- */
function unlock() {
  let input = document.getElementById("code").value.trim();

  if (input === "1218") {
    document.getElementById("login").style.display = "none";
    document.getElementById("header").style.display = "block";
    document.getElementById("menu").style.display = "grid";
    render();
  } else {
    alert("Wrong code");
  }
}

/* ---------------- MENU ---------------- */
function render() {
  let menu = document.getElementById("menu");
  menu.innerHTML = "";

  games.forEach(name => {
    let div = document.createElement("div");
    div.className = "game";
    div.innerText = name;
    div.onclick = () => open(name);
    menu.appendChild(div);
  });
}

function open(name) {
  current = name;

  document.getElementById("menu").style.display = "none";
  document.getElementById("play").style.display = "block";
  document.getElementById("title").innerText = name;

  ctx.clearRect(0,0,400,400);

  if (name === "Snake") snake();
  if (name === "BitLife") bitlife();
}

function back() {
  document.getElementById("menu").style.display = "grid";
  document.getElementById("play").style.display = "none";
  clearInterval(loop);
}

/* ---------------- SNAKE (REAL GRID GAME) ---------------- */
let snake, dir, food, loop;

function snake() {
  snake = [{x:200,y:200}];
  dir = {x:20,y:0};
  food = rand();

  document.onkeydown = e => {
    if (e.key === "ArrowUp") dir = {x:0,y:-20};
    if (e.key === "ArrowDown") dir = {x:0,y:20};
    if (e.key === "ArrowLeft") dir = {x:-20,y:0};
    if (e.key === "ArrowRight") dir = {x:20,y:0};
  };

  clearInterval(loop);

  loop = setInterval(() => {
    let head = {x:snake[0].x + dir.x, y:snake[0].y + dir.y};
    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      food = rand();
    } else {
      snake.pop();
    }

    drawSnake();
  }, 120);
}

function drawSnake() {
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 20, 20);

  ctx.fillStyle = "lime";
  snake.forEach(p => ctx.fillRect(p.x, p.y, 20, 20));
}

function rand() {
  return {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

/* ---------------- BITLIFE ---------------- */
let life;

function bitlife() {
  life = {
    age: 18,
    money: 0,
    happiness: 50
  };

  document.getElementById("ui").innerHTML = `
    <button onclick="nextYear()">Next Year</button>
    <p id="stats"></p>
  `;

  updateLife();
}

function nextYear() {
  life.age++;

  let events = [
    () => life.money += 20,
    () => life.money -= 10,
    () => life.happiness += 10,
    () => life.happiness -= 10
  ];

  events[Math.floor(Math.random()*events.length)]();

  updateLife();
}

function updateLife() {
  document.getElementById("stats").innerText =
    `Age: ${life.age} | Money: $${life.money} | Happiness: ${life.happiness}`;
}

</script>

</body>
</html>
