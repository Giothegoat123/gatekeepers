<!DOCTYPE html>
<html>
<head>
  <title>Gatekeepers Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
    }

    #topbar {
      background: #111;
      color: white;
      padding: 15px;
    }

    #games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game {
      background: white;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    #screen {
      display: none;
      padding: 20px;
    }

    canvas {
      background: black;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<div id="topbar">
  <h1>🎮 Gatekeepers Arcade</h1>
</div>

<div id="games"></div>

<div id="screen">
  <button onclick="back()">⬅ Back</button>
  <h2 id="title"></h2>
  <div id="output"></div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
</div>

<script>

let games = ["Snake", "Pong", "BitLife"];
let current = "";

function render() {
  const g = document.getElementById("games");
  g.innerHTML = "";

  games.forEach(name => {
    const div = document.createElement("div");
    div.className = "game";
    div.innerText = name;
    div.onclick = () => open(name);
    g.appendChild(div);
  });
}

function open(name) {
  current = name;

  document.getElementById("games").style.display = "none";
  document.getElementById("screen").style.display = "block";
  document.getElementById("title").innerText = name;

  clearCanvas();

  if (name === "Snake") snake();
  if (name === "Pong") pong();
  if (name === "BitLife") bitlife();
}

function back() {
  document.getElementById("games").style.display = "grid";
  document.getElementById("screen").style.display = "none";
  clearInterval(loop);
}

// ------------------ CANVAS ------------------
let ctx = document.getElementById("gameCanvas").getContext("2d");

function clearCanvas() {
  ctx.clearRect(0,0,400,400);
}

// ================== SNAKE ==================
let snakeBody, dir, food, loop;

function snake() {
  snakeBody = [{x:200,y:200}];
  dir = {x:20,y:0};
  food = randomFood();

  document.onkeydown = e => {
    if (e.key === "ArrowUp") dir = {x:0,y:-20};
    if (e.key === "ArrowDown") dir = {x:0,y:20};
    if (e.key === "ArrowLeft") dir = {x:-20,y:0};
    if (e.key === "ArrowRight") dir = {x:20,y:0};
  };

  loop = setInterval(() => {
    let head = {
      x: snakeBody[0].x + dir.x,
      y: snakeBody[0].y + dir.y
    };

    snakeBody.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      food = randomFood();
    } else {
      snakeBody.pop();
    }

    drawSnake();
  }, 120);
}

function drawSnake() {
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 20, 20);

  ctx.fillStyle = "lime";
  snakeBody.forEach(p => {
    ctx.fillRect(p.x, p.y, 20, 20);
  });
}

function randomFood() {
  return {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

// ================== PONG ==================
let ball, paddleY, ballSpeed;

function pong() {
  ball = {x:200,y:200,vx:3,vy:3};
  paddleY = 150;

  document.onmousemove = e => {
    let rect = document.getElementById("gameCanvas").getBoundingClientRect();
    paddleY = e.clientY - rect.top;
  };

  loop = setInterval(() => {
    ctx.clearRect(0,0,400,400);

    // ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.y < 0 || ball.y > 400) ball.vy *= -1;

    // AI paddle
    let aiY = ball.y - 30;

    // collision player
    if (ball.x < 20 && ball.y > paddleY && ball.y < paddleY + 60) {
      ball.vx *= -1;
    }

    // collision AI
    if (ball.x > 380) ball.vx *= -1;

    ctx.fillStyle = "white";
    ctx.fillRect(ball.x, ball.y, 10, 10);

    ctx.fillRect(10, paddleY, 10, 60);
    ctx.fillRect(380, aiY, 10, 60);

  }, 16);
}

// ================== BITLIFE ==================
let life = {};

function bitlife() {
  life = {
    age: 18,
    money: 0,
    happiness: 50
  };

  document.getElementById("output").innerHTML = `
    <button onclick="live()">Next Year</button>
    <p id="stats"></p>
  `;

  updateLife();
}

function live() {
  life.age++;

  let events = [
    () => life.money += 20,
    () => life.happiness += 10,
    () => life.money -= 10,
    () => life.happiness -= 10
  ];

  events[Math.floor(Math.random()*events.length)]();

  updateLife();
}

function updateLife() {
  document.getElementById("stats").innerText =
    `Age: ${life.age} | Money: $${life.money} | Happiness: ${life.happiness}`;
}

window.onload = render;

</script>

</body>
</html>
