<!DOCTYPE html>
<html>
<head>
  <title>Gio Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(#050b1a, #000814);
      color: white;
      text-align: center;
    }

    #login {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #1f6fff;
      color: white;
      cursor: pointer;
    }

    #header {
      display: none;
      padding: 15px;
      background: linear-gradient(90deg, #001133, #0033aa);
      box-shadow: 0 0 20px #1f6fff;
    }

    #menu {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .game {
      background: #0b1b3a;
      border: 1px solid #1f6fff;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
    }

    .game:hover {
      transform: scale(1.05);
    }

    #play {
      display: none;
      padding: 20px;
    }

    canvas {
      background: black;
      border: 1px solid #1f6fff;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>🔐 Enter Code</h1>
  <input id="code" placeholder="1218">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- HEADER -->
<div id="header">
  <h1>⚡ Welcome to Gio’s Game Site</h1>
</div>

<!-- MENU -->
<div id="menu"></div>

<!-- GAME SCREEN -->
<div id="play">
  <button onclick="back()">⬅ Back</button>
  <h2 id="title"></h2>
  <canvas id="canvas" width="400" height="400"></canvas>
</div>

<script>

let games = ["Snake"];
let ctx = document.getElementById("canvas").getContext("2d");

let snake, dir, food, loop;

/* ---------------- LOGIN (FIXED 100%) ---------------- */
function unlock() {
  const input = document.getElementById("code").value;

  if (String(input).trim() === "1218") {
    document.getElementById("login").style.display = "none";
    document.getElementById("header").style.display = "block";
    document.getElementById("menu").style.display = "grid";
    render();
  } else {
    alert("Wrong code");
  }
}

/* ---------------- MENU ---------------- */
function render() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  games.forEach(name => {
    const div = document.createElement("div");
    div.className = "game";
    div.innerText = name;
    div.onclick = () => open(name);
    menu.appendChild(div);
  });
}

function open(name) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("play").style.display = "block";
  document.getElementById("title").innerText = name;

  if (name === "Snake") startSnake();
}

function back() {
  document.getElementById("menu").style.display = "grid";
  document.getElementById("play").style.display = "none";
  clearInterval(loop);
}

/* ---------------- REAL SNAKE ---------------- */
function startSnake() {
  snake = [{x:200,y:200}];
  dir = {x:20,y:0};
  food = randomFood();

  document.onkeydown = e => {
    if (e.key === "ArrowUp") dir = {x:0,y:-20};
    if (e.key === "ArrowDown") dir = {x:0,y:20};
    if (e.key === "ArrowLeft") dir = {x:-20,y:0};
    if (e.key === "ArrowRight") dir = {x:20,y:0};
  };

  clearInterval(loop);

  loop = setInterval(() => {
    let head = {x:snake[0].x + dir.x, y:snake[0].y + dir.y};
    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      food = randomFood();
    } else {
      snake.pop();
    }

    draw();
  }, 120);
}

function draw() {
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 20, 20);

  ctx.fillStyle = "lime";
  snake.forEach(p => ctx.fillRect(p.x, p.y, 20, 20));
}

function randomFood() {
  return {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

/* ---------------- START ---------------- */
window.onload = () => {
  console.log("Site loaded");
};

</script>

</body>
</html>
