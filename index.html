<!DOCTYPE html>
<html>
<head>
  <title>Gio's Game Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(#050b1a, #000);
      color: white;
    }

    #login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      background: #1f6fff;
      color: white;
      border: none;
      border-radius: 8px;
    }

    #header {
      display: none;
      text-align: center;
      padding: 20px;
      background: linear-gradient(90deg, #001133, #0033aa);
      box-shadow: 0 0 20px #1f6fff;
    }

    #games {
      display: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .game {
      background: #0b1b3a;
      border: 1px solid #1f6fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 10px #1f6fff33;
    }

    .game:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #1f6fff;
    }

    #play {
      display: none;
      text-align: center;
      padding: 20px;
    }

    canvas {
      background: black;
      margin-top: 10px;
      border: 1px solid #1f6fff;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>🔐 Enter Access Code</h1>
  <input id="code" placeholder="1218">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- HEADER -->
<div id="header">
  <h1>⚡ Welcome to Gio's Game Site</h1>
</div>

<!-- GAME LIST -->
<div id="games"></div>

<!-- GAME SCREEN -->
<div id="play">
  <button onclick="back()">⬅ Back</button>
  <h2 id="title"></h2>
  <div id="output"></div>
  <canvas id="c" width="400" height="400"></canvas>
</div>

<script>

let games = [];
let current = "";

let ctx = document.getElementById("c").getContext("2d");

// generate 100+ games (real variations)
for (let i = 1; i <= 120; i++) {
  games.push({
    name: "Arcade Game " + i,
    type: ["snake","pong","reaction","clicker"][Math.floor(Math.random()*4)]
  });
}

function unlock() {
  let code = document.getElementById("code").value;

  if (code === "1218") {
    document.getElementById("login").style.display = "none";
    document.getElementById("header").style.display = "block";
    document.getElementById("games").style.display = "grid";
    render();
  } else {
    alert("Wrong code");
  }
}

function render() {
  let g = document.getElementById("games");
  g.innerHTML = "";

  games.forEach((game, i) => {
    let div = document.createElement("div");
    div.className = "game";
    div.innerText = game.name;
    div.onclick = () => openGame(i);
    g.appendChild(div);
  });
}

function openGame(i) {
  current = games[i];

  document.getElementById("games").style.display = "none";
  document.getElementById("play").style.display = "block";
  document.getElementById("title").innerText = current.name;

  runGame();
}

function back() {
  document.getElementById("games").style.display = "grid";
  document.getElementById("play").style.display = "none";
  ctx.clearRect(0,0,400,400);
}

// ------------------- GAME ENGINE -------------------

function runGame() {
  ctx.clearRect(0,0,400,400);

  if (current.type === "reaction") reaction();
  if (current.type === "clicker") clicker();
  if (current.type === "snake") snakeLite();
  if (current.type === "pong") pongLite();
}

// Reaction game
function reaction() {
  document.getElementById("output").innerHTML = "Wait for flash...";
  setTimeout(() => {
    let start = Date.now();
    document.getElementById("output").innerHTML = "<button onclick='hit()'>CLICK!</button>";

    window.hit = function() {
      let time = Date.now() - start;
      document.getElementById("output").innerText = "⚡ " + time + "ms";
    };
  }, Math.random()*3000+1000);
}

// Clicker game
function clicker() {
  let score = 0;
  document.getElementById("output").innerHTML =
    "<button onclick='add()'>Click Me</button><p id='s'>0</p>";

  window.add = function() {
    score++;
    document.getElementById("s").innerText = score;
  };
}

// Simple snake
let x=200,y=200;
function snakeLite() {
  document.getElementById("output").innerText = "Use arrow keys";

  document.onkeydown = e => {
    if(e.key==="ArrowUp") y-=10;
    if(e.key==="ArrowDown") y+=10;
    if(e.key==="ArrowLeft") x-=10;
    if(e.key==="ArrowRight") x+=10;

    ctx.fillStyle="lime";
    ctx.fillRect(x,y,10,10);
  };
}

// Pong mini
let bx=200,by=200,vx=3,vy=3;
function pongLite() {
  document.getElementById("output").innerText = "Pong running";

  setInterval(()=>{
    ctx.clearRect(0,0,400,400);

    bx+=vx;
    by+=vy;

    if(by<0||by>400)vy*=-1;
    if(bx<0||bx>400)vx*=-1;

    ctx.fillStyle="white";
    ctx.fillRect(bx,by,10,10);
  },20);
}

</script>

</body>
</html>
