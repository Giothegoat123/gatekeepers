<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BitLife Update - Bitlife</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Nunito Sans', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* LOCK SCREEN */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 18px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* PAGE CONTENT */
#pageContent {
    display: none;
}

header {
    background: #111827;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #22c55e;
}

.logo-text {
    color: #22c55e;
    font-size: 22px;
    font-weight: bold;
    text-decoration: none;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
}

nav a:hover {
    background: #22c55e;
    color: black;
}

iframe {
    width: 100%;
    height: 600px;
    border: none;
    border-radius: 12px;
    margin-top: 20px;
}

h1 {
    text-align: center;
    color: #22c55e;
    margin-top: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div id="lockScreen">
    <h2>Enter Access Code</h2>
    <input type="password" id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Unlock</button>
</div>

<!-- 🔓 PAGE CONTENT -->
<div id="pageContent">

<header>
    <a class="logo-text" href="/">Bitlife</a>
    <nav>
        <a href="/duck-life">Duck Life</a>
        <a href="/dog-life-simulator">Dog Life</a>
    </nav>
</header>

<div class="container">

    <iframe src="https://lifesimulator.online/game/bitlife/"></iframe>

    <h1>BitLife Update</h1>

    <div class="card">
        <h2>About</h2>
        <p>Experience life like never before with new updates, choices, and paths.</p>
    </div>

    <div class="card">
        <h2>What’s New</h2>
        <ul>
            <li>New life events</li>
            <li>Better stats system</li>
            <li>Improved UI</li>
            <li>More customization</li>
        </ul>
    </div>

</div>

</div>

<script>
function checkCode() {
    let code = document.getElementById("codeInput").value;

    if (code === "1218") {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("pageContent").style.display = "block";
    } else {
        alert("Wrong code");
    }
}
</script>

</body>
</html>
