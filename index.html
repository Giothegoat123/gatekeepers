<!DOCTYPE html>
<html>
<head>
  <title>Gatekeepers Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    #topbar {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #search {
      padding: 10px;
      width: 60%;
      font-size: 16px;
      margin-top: 10px;
    }

    #categories {
      text-align: center;
      padding: 10px;
    }

    #categories button {
      margin: 5px;
      padding: 10px;
      border: none;
      cursor: pointer;
      background: #333;
      color: white;
      border-radius: 5px;
    }

    #games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
      background: #eaeaea;
    }

    #playScreen {
      display: none;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="topbar">
  <h1>🎮 Gatekeepers Arcade</h1>
  <input id="search" placeholder="Search games..." oninput="renderGames()">
</div>

<div id="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('arcade')">Arcade</button>
  <button onclick="filter('puzzle')">Puzzle</button>
  <button onclick="filter('luck')">Luck</button>
</div>

<div id="games"></div>

<div id="playScreen">
  <button onclick="back()">⬅ Back</button>
  <h2 id="gameTitle"></h2>
  <p id="gameOutput"></p>
  <button onclick="playGame()">▶ Play</button>
</div>

<script>
let games = [];
let currentGame = null;
let currentFilter = "all";

// create 200 games (expandable to 10,000)
for (let i = 1; i <= 200; i++) {
  const types = ["arcade", "puzzle", "luck"];
  games.push({
    id: i,
    name: "Game " + i,
    type: types[Math.floor(Math.random() * types.length)]
  });
}

function renderGames() {
  const search = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("games");

  container.innerHTML = "";

  for (let g of games) {
    if (
      (currentFilter === "all" || g.type === currentFilter) &&
      g.name.toLowerCase().includes(search)
    ) {
      container.innerHTML += `
        <div class="game" onclick="openGame(${g.id})">
          <h3>${g.name}</h3>
          <p>${g.type}</p>
        </div>
      `;
    }
  }
}

function filter(type) {
  currentFilter = type;
  renderGames();
}

function openGame(id) {
  currentGame = games.find(g => g.id === id);

  document.getElementById("games").style.display = "none";
  document.getElementById("playScreen").style.display = "block";

  document.getElementById("gameTitle").innerText = currentGame.name;
  document.getElementById("gameOutput").innerText = "";
}

function back() {
  document.getElementById("games").style.display = "grid";
  document.getElementById("playScreen").style.display = "none";
  renderGames();
}

function playGame() {
  if (!currentGame) return;

  let result = "";

  if (currentGame.type === "arcade") {
    result = Math.random() > 0.5 ? "🎉 You Win!" : "💀 You Lose!";
  }

  if (currentGame.type === "puzzle") {
    const ans = prompt("What is 10 + 5?");
    result = ans === "15" ? "✅ Correct!" : "❌ Wrong!";
  }

  if (currentGame.type === "luck") {
    result = Math.random() > 0.7 ? "🍀 Lucky Win!" : "😵 Bad Luck!";
  }

  document.getElementById("gameOutput").innerText = result;
}

window.onload = renderGames;
</script>

</body>
</html>
