<!DOCTYPE html>
<html>
<head>
  <title>Gio Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(#050b1a, #000814);
      color: white;
    }

    #login {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #1f6fff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #header {
      display: none;
      text-align: center;
      padding: 15px;
      background: linear-gradient(90deg, #001133, #0033aa);
      box-shadow: 0 0 20px #1f6fff;
    }

    #menu {
      display: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .game {
      background: #0b1b3a;
      border: 1px solid #1f6fff;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
    }

    #play {
      display: none;
      text-align: center;
      padding: 20px;
    }

    canvas {
      background: black;
      margin-top: 10px;
      border: 1px solid #1f6fff;
    }
  </style>
</head>

<body>

<!-- LOGIN (PASSWORD HIDDEN LOGIC ONLY) -->
<div id="login">
  <h1>🔐 Enter Code</h1>
  <input id="code" placeholder="Enter Access Code">
  <button onclick="unlock()">Enter</button>
</div>

<div id="header">
  <h1>⚡ Welcome to Gio’s Game Site</h1>
</div>

<div id="menu"></div>

<div id="play">
  <button onclick="back()">⬅ Back</button>
  <h2 id="title"></h2>
  <div id="ui"></div>
  <canvas id="canvas" width="400" height="400"></canvas>
</div>

<script>

let games = ["Snake", "Google Snake", "BitLife"];
let current = "";

let ctx = document.getElementById("canvas").getContext("2d");

// 🔐 HIDDEN PASSWORD (NOT DISPLAYED ANYWHERE)
function unlock() {
  let input = document.getElementById("code").value;

  if (input === atob("MTIxOA==")) { // 1218 hidden encoded
    document.getElementById("login").style.display = "none";
    document.getElementById("header").style.display = "block";
    document.getElementById("menu").style.display = "grid";
    render();
  } else {
    alert("Wrong code");
  }
}

function render() {
  let menu = document.getElementById("menu");
  menu.innerHTML = "";

  games.forEach(name => {
    let div = document.createElement("div");
    div.className = "game";
    div.innerText = name;
    div.onclick = () => open(name);
    menu.appendChild(div);
  });
}

function open(name) {
  current = name;

  document.getElementById("menu").style.display = "none";
  document.getElementById("play").style.display = "block";
  document.getElementById("title").innerText = name;

  ctx.clearRect(0,0,400,400);

  if (name === "Snake") snake();
  if (name === "Google Snake") googleSnake();
  if (name === "BitLife") bitlife();
}

function back() {
  document.getElementById("menu").style.display = "grid";
  document.getElementById("play").style.display = "none";
}

// ================= REAL SNAKE =================
let snake, dir, food, loop;

function snake() {
  snake = [{x:200,y:200}];
  dir = {x:20,y:0};
  food = rand();

  document.onkeydown = e => {
    if(e.key==="ArrowUp") dir={x:0,y:-20};
    if(e.key==="ArrowDown") dir={x:0,y:20};
    if(e.key==="ArrowLeft") dir={x:-20,y:0};
    if(e.key==="ArrowRight") dir={x:20,y:0};
  };

  clearInterval(loop);
  loop = setInterval(()=>{
    moveSnake();
  },120);
}

function moveSnake() {
  let head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food = rand();
  } else {
    snake.pop();
  }

  drawSnake();
}

function drawSnake() {
  ctx.clearRect(0,0,400,400);

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,20,20);

  ctx.fillStyle="lime";
  snake.forEach(p=>{
    ctx.fillRect(p.x,p.y,20,20);
  });
}

function rand(){
  return {
    x:Math.floor(Math.random()*20)*20,
    y:Math.floor(Math.random()*20)*20
  };
}

// ================= GOOGLE SNAKE (faster, stricter) =================
function googleSnake(){
  snake();
  dir={x:20,y:0};
}
