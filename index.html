<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BitLife Update - Bitlife</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Nunito Sans', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* HEADER */
header {
    background: #111827;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #22c55e;
}

.logo-text {
    color: #22c55e;
    font-size: 22px;
    font-weight: bold;
    text-decoration: none;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
}

nav a:hover {
    background: #22c55e;
    color: black;
}

/* GAME BOX */
iframe {
    width: 100%;
    height: 600px;
    border: none;
    border-radius: 12px;
    margin-top: 20px;
}

/* TITLE */
h1 {
    text-align: center;
    color: #22c55e;
    margin-top: 20px;
}

/* SECTION */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(34,197,94,0.2);
}

/* GAME GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 20px;
}

.game {
    background: #1f2937;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.game img {
    width: 70px;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <a class="logo-text" href="/">Bitlife</a>
    <nav>
        <a href="/duck-life">Duck Life</a>
        <a href="/dog-life-simulator">Dog Life</a>
    </nav>
</header>

<div class="container">

    <iframe src="https://lifesimulator.online/game/bitlife/"></iframe>

    <h1>BitLife Update</h1>

    <div class="card">
        <h2>About</h2>
        <p>Experience life like never before with new updates, choices, and paths.</p>
    </div>

    <div class="card">
        <h2>What’s New</h2>
        <ul>
            <li>New life events</li>
            <li>Better stats system</li>
            <li>Improved UI</li>
            <li>More customization</li>
        </ul>
    </div>

    <div class="card">
        <h2>More Games</h2>

        <div class="grid">
            <div class="game">Duck Life</div>
            <div class="game">Dog Life</div>
            <div class="game">Cat Life</div>
            <div class="game">God Simulator</div>
        </div>
    </div>

</div>

</body>
</html>
