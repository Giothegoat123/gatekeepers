<!DOCTYPE html>
<html>
<head>
  <title>Gatekeepers Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    #topbar {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
    }

    #playScreen {
      display: none;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="topbar">
  <h1>🎮 Gatekeepers Arcade</h1>
</div>

<div id="games"></div>

<div id="playScreen">
  <button onclick="back()">⬅ Back</button>
  <h2 id="title"></h2>
  <div id="result"></div>
</div>

<script>

let games = [
  { name: "Snake" },
  { name: "Reaction" },
  { name: "Memory" }
];

let currentGame = null;

function render() {
  const container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach((g) => {
    const div = document.createElement("div");
    div.className = "game";
    div.innerText = g.name;

    div.onclick = function () {
      openGame(g.name);
    };

    container.appendChild(div);
  });
}

function openGame(name) {
  currentGame = name;

  document.getElementById("games").style.display = "none";
  document.getElementById("playScreen").style.display = "block";

  document.getElementById("title").innerText = name;
  document.getElementById("result").innerHTML = "";

  if (name === "Snake") snakeGame();
  if (name === "Reaction") reactionGame();
  if (name === "Memory") memoryGame();
}

function back() {
  document.getElementById("games").style.display = "grid";
  document.getElementById("playScreen").style.display = "none";
}

// --------------------
// 🐍 SNAKE (click version)
// --------------------
function snakeGame() {
  let score = 0;

  document.getElementById("result").innerHTML =
    "<button onclick='eatFood()'>Eat Food 🍎</button><p id='score'>Score: 0</p>";

  window.eatFood = function () {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
  };
}

// --------------------
// ⚡ REACTION GAME
// --------------------
function reactionGame() {
  let output = document.getElementById("result");
  output.innerText = "Wait for GREEN...";

  setTimeout(() => {
    let start = Date.now();

    output.innerHTML = "<button onclick='clickNow()'>CLICK!</button>";

    window.clickNow = function () {
      let time = Date.now() - start;
      output.innerText = "⏱ " + time + "ms reaction time";
    };
  }, Math.random() * 3000 + 1000);
}

// --------------------
// 🧠 MEMORY GAME
// --------------------
function memoryGame() {
  let num = Math.floor(Math.random() * 5) + 1;

  setTimeout(() => {
    let answer = prompt("Remember this number: " + num);

    if (answer == num) {
      document.getElementById("result").innerText = "✅ Correct!";
    } else {
      document.getElementById("result").innerText = "❌ Wrong!";
    }
  }, 500);
}

// start
window.onload = render;

</script>

</body>
</html>
